<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donna Mae Quinto XP - Boot Sequence</title>
    <style>

        /* Base Reset & Typography */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: Tahoma, "Segoe UI", Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /*Center Content*/
        .boot-container {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /*  CSS OS Logo */
        .os-logo {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px;
            width: 85px;
            height: 85px;
            margin-bottom: 10px;
            transform: skew(-15deg, 5deg);
            animation: pulse 3s infinite alternate ease-in-out;
        }

        .os-logo .pane {
            width: 100%;
            height: 100%;
            box-shadow: inset -2px -2px 5px rgba(0,0,0,0.3), inset 2px 2px 5px rgba(255,255,255,0.4);
        }

        .pane.red { background: #f05322; border-radius: 40% 5px 5px 5px; }
        .pane.green { background: #81bc06; border-radius: 5px 40% 5px 5px; }
        .pane.blue { background: #00a4e4; border-radius: 5px 5px 5px 40%; }
        .pane.yellow { background: #ffba08; border-radius: 5px 5px 40% 5px; }

        .title-group {
            margin-bottom: 25px;
        }

        h1 {
            font-size: 2.8rem;
            font-weight: normal;
            letter-spacing: -1px;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            gap: 5px;
        }

        .xp-text {
            color: #ff6a00;
            font-size: 1.5rem;
            font-weight: bold;
            margin-top: -5px;
        }

        .subtitle {
            font-size: 1.1rem;
            font-style: italic;
            color: #e0e0e0;
            margin-top: -5px;
            text-align: left;
            padding-left: 5px;
        }

        /* loading bar */
        .loading-bar-container {
            width: 160px;
            height: 18px;
            border: 2px solid #8e8e8e;
            border-radius: 6px;
            background-color: #000;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0px 0px 3px rgba(255,255,255,0.2);
        }

        .loading-blocks {
            height: 100%;
            width: 50px;
            /* segmented blue block look */
            background: repeating-linear-gradient(
                90deg,
                #2855ff,
                #2855ff 8px,
                transparent 8px,
                transparent 10px
            );
            position: absolute;
            top: 0;
            left: -60px;
            animation: loading 2.5s infinite linear;
        }

        .bottom-left {
            position: absolute;
            bottom: 30px;
            left: 30px;
            font-size: 0.85rem;
            color: #cccccc;
            line-height: 1.4;
        }

        .bottom-right {
            position: absolute;
            bottom: 30px;
            right: 30px;
            font-size: 1.5rem;
            font-weight: bold;
            font-style: italic;
            color: #ffffff;
        }

        /* Keyframe Animations */
        @keyframes loading {
            0% { left: -60px; }
            100% { left: 170px; }
        }

        @keyframes pulse {
            0% { filter: brightness(1); }
            100% { filter: brightness(1.2); }
        }
    </style>
</head>
<body>

    <div class="boot-container">
        
        <div class="os-logo">
            <div class="pane red"></div>
            <div class="pane green"></div>
            <div class="pane blue"></div>
            <div class="pane yellow"></div>
        </div>

        <div class="title-group">
            <h1>Donna Mae Quinto <span class="xp-text">XP</span></h1>
            <div class="subtitle"> </div>
        </div>

        <div class="loading-bar-container">
            <div class="loading-blocks"></div>
        </div>

    </div>

    <div class="bottom-left">
        For the best experience<br>
        Enter Full Screen (F11)
    </div>

    <div class="bottom-right">
        Portfolio&reg;
    </div>

</body>
</html>
