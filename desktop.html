<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donna Mae Quinto - Desktop</title>
    <link rel="stylesheet" href="css/desktop.css">
</head>
<body>

    <div class="desktop">
        <div class="icon-grid">
            <div class="icon" onclick="openWindow('about')">
                <img src="assets/images/computer-icon.png" alt="About">
                <span>About Me</span>
            <div class="icon" onclick="openWindow('resume')">
                    <img src="assets/images/pdf-icon.png" alt="Resume">
                    <span>My Resume</span>
            </div>
            <div class="icon" onclick="openWindow('projects')">
                <img src="assets/images/ie-icon.png" alt="Projects">
                <span>My Projects</span>
            </div>
            <div class="icon" onclick="openWindow('contact')">
                <img src="assets/images/mail-icon.png" alt="Contact">
                <span>Contact</span>
            </div>
        </div>

        <div class="taskbar">
            <button class="start-button">
                <img src="assets/images/xp-logo.png" alt="XP" class="start-icon">
                start
            </button>
            
            <div class="taskbar-divider"></div>
            
            <div class="system-tray">
                <div class="tray-icons">
                    <span>🔊</span>
                    <span>🔋</span>
                </div>
                <div id="clock">12:00 PM</div>
            </div>
        </div>
    </div>

    <script src="js/desktop.js"></script>
</body>
</html>
