<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donna Mae Quinto XP - Login</title>
    <link rel="stylesheet" href="/src/styles/login.css">
</head>
<body>

    <div class="login-screen">
        <div class="header-bar"></div>

        <div class="middle-section">
            <div class="left-panel">
                <div class="logo-area">
                    <img src="/assets/images/xp-logo.png" alt="Windows XP" class="xp-logo">
                    <p>To begin, click on your user name</p>
                </div>
            </div>

            <div class="divider"></div>

            <div class="right-panel">
                <div class="user-card" onclick="window.location.href='/desktop.html'">
                    <div class="avatar-container">
                        <img src="/assets/images/avatar.png" alt="Donna" class="avatar">
                    </div>
                    <div class="user-info">
                        <span class="username">Donna Mae Quinto</span>
                        <span class="user-desc">&nbsp;</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="footer-bar">
            <div class="shutdown-btn">
                <span class="icon">⏻</span> Turn off computer
            </div>
        </div>
    </div>

</body>
</html>
